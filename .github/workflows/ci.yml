name: CI

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Lint — fast checks
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check files
        run: echo "TODO — add lint steps when tech stack is chosen"

  # ---------------------------------------------------------------------------
  # Test — unit tests
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run tests
        run: echo "TODO — add test steps when tech stack is chosen"
