name: CI

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # ADR Conformance — architecture decision enforcement
  # ---------------------------------------------------------------------------
  adr-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run ADR conformance checks
        run: scripts/check-adr-conformance.sh

  # ---------------------------------------------------------------------------
  # Lint — formatting and static analysis
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    needs: [adr-conformance]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@98c8021b550208e51a6a1635b0dc7c3d21ce9e36 # v2
      - name: cargo fmt --check
        run: cargo fmt --all --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # Test — build and unit tests
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable
      - uses: Swatinem/rust-cache@98c8021b550208e51a6a1635b0dc7c3d21ce9e36 # v2
      - name: cargo build
        run: cargo build --workspace --all-targets
      - name: cargo test
        run: cargo test --workspace --all-targets
